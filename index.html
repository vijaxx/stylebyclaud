<!doctype html><html lang="en"><head>
<meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1">
<title>Style by Claud — shop the looks</title>
<style>
:root{--bg:#121214;--card:#1c1c20;--lime:#b4ff00;--txt:#fff;--mut:#a9a9b2}
*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--txt);
font-family:-apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif}
header{text-align:center;padding:28px 16px 10px}
.logo{width:76px;height:76px;border-radius:50%;border:3px solid var(--lime);
display:flex;align-items:center;justify-content:center;margin:0 auto 10px;
font-weight:800;font-size:30px}
h1{margin:6px 0 2px;font-size:20px}.sub{color:var(--mut);font-size:14px;margin:0}
.grid{max-width:980px;margin:18px auto;padding:0 14px;display:grid;
grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:14px}
@media(min-width:600px){.grid{gap:18px}}
.card{background:var(--card);border-radius:16px;overflow:hidden;text-decoration:none;
color:var(--txt);display:flex;flex-direction:column;transition:transform .15s}
.card:active{transform:scale(.98)}
.card img{width:100%;aspect-ratio:3/4;object-fit:cover;background:#26262b}
.meta{padding:10px 12px;display:flex;flex-direction:column;gap:8px;flex:1}
.t{font-size:13px;line-height:1.3;display:-webkit-box;-webkit-line-clamp:2;
-webkit-box-orient:vertical;overflow:hidden}
.btn{margin-top:auto;background:var(--lime);color:#000;font-weight:700;font-size:13px;
text-align:center;padding:9px;border-radius:10px}
footer{color:var(--mut);font-size:11px;text-align:center;padding:18px 20px 40px;line-height:1.5}
a.foot{color:var(--mut)}
</style></head><body>
<header>
  <div class="logo">SbC</div>
  <h1>Style by Claud</h1>
  <p class="sub">👗 Daily outfit &amp; saree finds · tap any look to shop</p>
</header>
<main class="grid">
    <a class="card" href="https://www.amazon.in/dp/B0H5BXF1Q9?tag=stylebyclaud-21" target="_blank" rel="nofollow sponsored noopener">
      <img loading="lazy" src="https://m.media-amazon.com/images/I/71wcbjawC7L._SL1500_.jpg" alt="Ajrakh Modal Silk Saree for Women | Mirr">
      <div class="meta"><span class="t">Ajrakh Modal Silk Saree for Women | Mirror Work Black Saree | Gajji Silk Red Pal</span>
        <span class="btn">Shop on Amazon →</span></div>
    </a>
</main>
<footer>As an Amazon Associate I earn from qualifying purchases.<br>
Prices &amp; availability shown on Amazon.</footer>
</body></html>
